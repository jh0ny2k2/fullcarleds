<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Admin - Car Led System</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;450;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/admin.css">
  <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'%3E%3Crect width='100' height='100' rx='20' fill='%23E30613'/%3E%3Ctext x='50' y='68' text-anchor='middle' fill='white' font-size='50' font-weight='bold' font-family='Arial'%3EC%3C/text%3E%3C/svg%3E">
</head>
<body class="admin-body">

  <!-- SIDEBAR -->
  <div class="admin-side">
    <a href="#" class="admin-side-logo">Car <span>Led</span></a>
    <div class="admin-side-nav">
      <a href="#" class="active" data-section="overview"><span class="ico">&#9632;</span> <span>Overview</span></a>
      <a href="#" data-section="productos"><span class="ico">&#9733;</span> <span>Productos</span></a>
      <a href="#" data-section="trabajos"><span class="ico">&#9998;</span> <span>Trabajos</span></a>
      <a href="#" data-section="clientes"><span class="ico">&#9787;</span> <span>Clientes</span></a>
    </div>
    <div class="admin-side-foot">
      <a href="#" onclick="adminLogout()">Cerrar sesión</a>
    </div>
  </div>

  <!-- MAIN -->
  <div class="admin-main">
    <!-- Top bar -->
    <div class="admin-head">
      <h2 id="section-title">Overview</h2>
      <div class="admin-head-actions">
        <a href="index.html" target="_blank">Ver web</a>
      </div>
    </div>

    <!-- Content -->
    <div class="admin-body-content">

      <!-- === OVERVIEW === -->
      <div class="admin-section active" id="sec-overview">
        <div class="ov-grid" id="ov-cards"></div>
        <div id="ov-products" style="margin-top:8px"></div>
      </div>

      <!-- === PRODUCTOS === -->
      <div class="admin-section" id="sec-productos">
        <div style="display:flex;gap:8px;margin-bottom:16px;flex-wrap:wrap">
          <button class="btn" onclick="openProdModal()">+ Añadir</button>
        </div>
        <div id="prod-list"></div>
      </div>

      <!-- === TRABAJOS === -->
      <div class="admin-section" id="sec-trabajos">
        <div style="display:flex;gap:8px;margin-bottom:16px;flex-wrap:wrap">
          <button class="btn" onclick="openTrabModal()">+ Añadir</button>
        </div>
        <div id="trab-list"></div>
      </div>

      <!-- === CLIENTES === -->
      <div class="admin-section" id="sec-clientes">
        <div style="display:flex;gap:8px;margin-bottom:16px;flex-wrap:wrap">
          <button class="btn" onclick="openCliModal()">+ Añadir</button>
        </div>
        <div id="cli-list"></div>
      </div>

    </div>
  </div>

  <div class="admin-toast" id="admin-toast"></div>

  <!-- MODAL (CRUD) -->
  <div class="admin-modal" id="admin-modal">
    <div class="admin-modal-box">
      <h3 id="modal-title"></h3>
      <form id="modal-form" onsubmit="event.preventDefault(); modalSave();">
        <div id="modal-body"></div>
        <div class="actions">
          <button type="button" class="btn-cancel" onclick="modalClose()">Cancelar</button>
          <button type="submit" class="btn-save">Guardar</button>
        </div>
      </form>
    </div>
  </div>

  <!-- MODAL (LOGIN) -->
  <div class="admin-modal" id="login-modal">
    <div class="admin-modal-box">
      <h3>Iniciar sesión</h3>
      <div class="field">
        <label>Usuario</label>
        <input type="text" id="login-user" placeholder="admin">
      </div>
      <div class="field">
        <label>Contraseña</label>
        <input type="password" id="login-pass" placeholder="••••••••">
      </div>
      <div class="actions" style="margin-top:0">
        <button class="btn-save" onclick="handleLogin()" style="width:100%;justify-content:center">Entrar</button>
      </div>
      <div class="admin-login-error" id="login-error" style="margin-top:10px;text-align:center">Usuario o contraseña incorrectos</div>
    </div>
  </div>

  <script src="js/admin.js"></script>
  <script>
    adminCheck();
    seedData();
    renderAll();
    initNav();
  </script>

</body>
</html>
